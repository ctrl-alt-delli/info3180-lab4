{% extends 'base.html' %}
{% block main %}
<h1 class="page-header">Uploaded Images</h1>
<div class="image-grid">
    <ul>
        {% for image in images %}
        <li>
            <img src="{{ url_for('get_image', filename=image) }}" alt="{{ image }}" width="200">
        </li>
        <br>
        {% endfor %}
    </ul>
</div>
{% endblock %}
